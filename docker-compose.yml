version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claims-postgres
    environment:
      POSTGRES_DB: claims_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./seed_data:/docker-entrypoint-initdb.d/seed_data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d claims_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
